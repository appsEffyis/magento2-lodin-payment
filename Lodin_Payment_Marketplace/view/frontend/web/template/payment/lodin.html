<div class="payment-method" data-bind="css: {'_active': (getCode() == isChecked())}">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()"/>
        <label data-bind="attr: {'for': getCode()}" class="label">
            <span class="lodin-paybybank-title">
                <!-- Logo Lodin à gauche -->
                <img class="lodin-lodin-logo"
                     data-bind="attr: {src: require.toUrl('Lodin_Payment/images/lodin.png'), alt: 'Lodin'}"/>

                <!-- Texte au centre -->
                <span class="lodin-paybybank-text">
                    <span class="lodin-paybybank-name" data-bind="i18n: 'Pay by Bank'"></span>
                    <span class="lodin-paybybank-sub"
                          data-bind="i18n: 'Deposit securely from your bank app – no card needed.'"></span>
                </span>

                <!-- Logo banques à droite -->
                <img class="lodin-paybybank-banklogo"
                     data-bind="attr: {src: require.toUrl('Lodin_Payment/images/pay-by-bank.png'), alt: 'Banks'}"/>
            </span>
        </label>
    </div>
    <div class="payment-method-content">
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!--/ko-->
        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
                <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout"
                        type="submit"
                        data-bind="
                        click: placeOrder,
                        attr: {title: $t('Payer avec Lodin')},
                        css: {disabled: !isPlaceOrderActionAllowed()},
                        enable: (getCode() == isChecked())
                        ">
                    <span data-bind="i18n: 'Payer avec Lodin'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
